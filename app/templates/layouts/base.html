<!DOCTYPE html>
<html lang="vi">
{% include 'includes/header.html' %}

<body>
    <!-- 1. SIDEBAR (Dùng class của v5) -->
    <div class="sidebar sidebar-dark sidebar-fixed border-end" id="sidebar">
        <div class="sidebar-header border-bottom">
            <div class="sidebar-brand">
                <!-- Hiện khi Sidebar mở rộng -->
                <span class="sidebar-brand-full fw-bold fs-4">LaVie Project</span>
                <!-- Hiện khi Sidebar thu nhỏ (Viết tắt) -->
                <span class="sidebar-brand-narrow fw-bold fs-4">LV</span>
            </div>
        </div>

        <ul class="sidebar-nav" data-coreui="navigation">
            <li class="nav-item">
                <a class="nav-link" href="/dashboard">
                    <i class="nav-icon fas fa-tachometer-alt"></i> Dashboard
                </a>
            </li>
            <li class="nav-title">Nghiệp vụ</li>
            <li class="nav-item">
                <a class="nav-link" href="/fo">
                    <i class="nav-icon fas fa-concierge-bell"></i> Tiền sảnh (FO)
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/bo">
                    <i class="nav-icon fas fa-file-invoice-dollar"></i> Kế toán (BO)
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/hr">
                    <i class="nav-icon fas fa-users"></i> Nhân sự (HR)
                </a>
            </li>
        </ul>
        <div class="sidebar-footer border-top d-none d-md-flex">
            <button class="sidebar-toggler" type="button" data-coreui-toggle="unfoldable"></button>
        </div>
    </div>

    <!-- 2. MAIN WRAPPER (Đây là chỗ bản v5 tự động đẩy nội dung sang phải) -->
    <div class="wrapper d-flex flex-column min-vh-100">

        <!-- HEADER TRÊN CÙNG -->
        <header class="header header-sticky p-0 mb-4 border-bottom">
            <div class="container-fluid border-bottom px-4">
                <button class="header-toggler" type="button"
                    onclick="coreui.Sidebar.getInstance(document.querySelector('#sidebar')).toggle()">
                    <i class="fas fa-bars"></i>
                </button>
                <ul class="header-nav ms-auto">
                    <li class="nav-item px-3"><span id="user_display_name" class="fw-bold">Admin</span></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()"><i
                                class="fas fa-sign-out-alt"></i></a></li>
                </ul>
            </div>
        </header>

        <!-- NỘI DUNG CHÍNH -->
        <div class="body flex-grow-1">
            <div class="container-lg px-4">
                {% block content %}{% endblock %}
            </div>
        </div>

        <!-- FOOTER -->
        <footer class="footer px-4">
            <div><strong>LaVie Project</strong> &copy; 2024 dành cho con gái.</div>
            <div class="ms-auto">v5.6.0</div>
        </footer>
    </div>

    {% include 'includes/footer.html' %}
</body>

</html>
