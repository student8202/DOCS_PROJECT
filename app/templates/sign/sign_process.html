{% extends "layouts/base_empty.html" %}
{% block content %}
<style>
    /* Bố cục chia 2 phần: Nội dung hồ sơ (Cuộn được) và Vùng ký (Cố định phía dưới) */
    #doc-viewer {
        height: 100vh;
        /* Cho phép cuộn toàn màn hình */
        overflow-y: auto;
        padding: 20px 20px 100px 20px;
        /* Thêm padding dưới 100px để không bị nút che */
        background: #fff;
    }

    #signature-pad {
        width: 100%;
        height: 160px;
        background: #fff;
        border: 1px dashed #ccc;
        touch-action: none;
        /* Quan trọng: Chặn cuộn trang khi ký */
    }

    .control-btns {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
    }

    /* Style cho vùng chờ ký trên tờ giấy */
    .sig-placeholder {
        /* border: 1px dashed #ccc; */
        /* background: #fff9f9; */
        min-height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        position: relative;
    }

    .placeholder-text {
        font-size: 12px;
        color: #999;
        font-style: italic;
    }

    #img-guest-sig,
    #img-recep-sig {
        mix-blend-mode: multiply;
    }

    /* Modal vùng ký */
    #modal-pad {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        z-index: 9999;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .pad-container {
        background: #fff;
        padding: 20px;
        border-radius: 15px;
        width: 90%;
        max-width: 600px;
    }

    #signature-pad {
        width: 100%;
        height: 300px;
        border: 1px solid #ddd;
        background: #fff;
        touch-action: none;
    }

    /* Style cho thanh điều khiển dưới cùng */
    .fixed-bottom-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #fff;
        border-top: 1px solid #dee2e6;
        padding: 10px 15px;
        z-index: 1030;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
    }

    /* Tối ưu cho điện thoại (Màn hình < 576px) */
    @media (max-width: 575.98px) {
        .fixed-bottom-bar {
            flex-direction: column;
            /* Xếp chồng nút lên nhau nếu quá hẹp */
            padding: 8px;
        }

        .fixed-bottom-bar button {
            width: 100%;
            /* Nút bấm tràn chiều ngang trên điện thoại */
            margin: 2px 0;
        }

        #doc-viewer {
            padding: 15px 15px 120px 15px;
            /* Tăng padding dưới để không bị lấp nội dung */
        }
    }

    /* 1. Vùng chứa ngoài: Luôn bằng màn hình điện thoại */
    #doc-viewer {
        width: 100%;
        height: calc(100vh - 70px);
        overflow: auto;
        /* Tự hiện thanh cuộn ngang/dọc */
        background: #525659;
        padding: 10px;
        -webkit-overflow-scrolling: touch;
    }

    /* 2. Tờ giấy: Ép cứng chiều rộng A4 */
    #rendered-content {
        width: 900px;
        /* Ép cứng để không nhảy chữ */
        margin: 0 auto;
        background: #fff;
        padding: 40px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        /* Giữ nguyên layout như Desktop */
    }

    /* 3. Modal ký: Phải to theo màn hình điện thoại, không theo tờ giấy */
    #modal-pad {
        position: fixed;
        /* Cố định theo khung hình thiết bị */
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        align-items: center;
        justify-content: center;
    }

    .pad-container {
        width: 95%;
        /* To gần hết màn hình điện thoại */
        max-width: 500px;
        background: #fff;
        padding: 15px;
        border-radius: 15px;
    }
</style>

<div class="d-flex flex-column h-100">
    <!-- 1. VÙNG HIỂN THỊ HỒ SƠ (HtmlContent đã render) -->
    <div id="doc-viewer">
        <div id="rendered-content">
            <!-- Dữ liệu HTML từ Queue sẽ nạp vào đây -->
            <div class="text-center mt-5">
                <div class="spinner-border text-success"></div>
                <p>Đang tải hồ sơ...</p>
            </div>
        </div>
    </div>
    <!-- MODAL KÝ TÊN TỰ ĐỘNG HIỆN LÊN -->
    <div id="modal-pad" style="display: none;"> <!-- Đảm bảo mặc định là ẩn -->
        <div class="pad-container shadow-lg">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="fw-bold m-0" id="pad-title">VUI LÒNG KÝ TÊN</h6>
                <button class="btn-close" onclick="SIGN.actions.closePad()"></button>
            </div>
            <!-- Khung ký -->
            <div style="background:#f9f9f9; border: 1px solid #eee;">
                <canvas id="signature-pad-canvas" style="width: 100%; height: 300px; cursor: crosshair;"></canvas>
            </div>
            <!-- Cập nhật Nhóm nút bấm Responsive -->
            <div class="d-flex flex-wrap justify-content-between mt-3 gap-2">
                <div class="d-flex gap-2 w-sm-auto w-100">
                    <button class="btn btn-secondary flex-grow-1 px-3" onclick="SIGN.actions.closePad()">HỦY</button>
                    <button class="btn btn-outline-danger flex-grow-1 px-3" onclick="SIGN.actions.clear()">XÓA</button>
                </div>
                <button class="btn btn-success px-5 fw-bold shadow-sm w-sm-auto w-100"
                    onclick="SIGN.actions.saveToDoc()">
                    XÁC NHẬN <i class="fas fa-check ms-1"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Nút Hoàn tất cuối cùng của trang -->
    <div class="fixed-bottom-bar shadow-lg">
        <div id="info-ref" class="small text-muted d-none d-sm-block">
            <!-- Hiện mã hồ sơ trên iPad, ẩn trên iPhone cho gọn -->
        </div>
        <!-- Nút thoát nhanh nằm bên trái -->
        <button class="btn btn-sm btn-outline-danger border-0" onclick="window.location.href='/sign/waiting'">
            <i class="fas fa-sign-out-alt"></i> THOÁT
        </button>
        <div class="d-flex gap-2 w-100 justify-content-end">
            <button class="btn btn-outline-secondary px-3 fw-bold" onclick="location.reload()">
                <i class="fas fa-undo"></i> LÀM MỚI
            </button>
            <button class="btn btn-danger px-4 fw-bold shadow-sm" onclick="SIGN.actions.finalSubmit()">
                HOÀN TẤT & GỬI <i class="fas fa-check-double ms-1"></i>
            </button>
        </div>
    </div>

</div>

<!-- Lưu QueueID để gửi lên backend -->
<input type="hidden" id="queue_id" value="{{ queue_id }}">
{% endblock %}

{% block scripts %}
<!-- Thư viện Signature Pad (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/signature_pad@5.1.3/dist/signature_pad.umd.min.js"></script>
<script src="/static/js/sign/sign_handler.js"></script>
<script>
    // Trong file sign_process.html
    const queueId = $('#queue_id').val(); 

    function checkQueueStatus() {
        $.get(`/api/v1/queue/check-valid/${queueId}`, function (res) {
            if (res.status === 'cancelled' || res.status === 'reset') {
                // Nếu hồ sơ đã bị Lễ tân Reset (Status 4)
                Swal.fire({
                    title: 'Hồ sơ đã thay đổi',
                    text: 'Lễ tân đã làm mới yêu cầu ký. Vui lòng đợi trong giây lát...',
                    icon: 'info',
                    showConfirmButton: false,
                    allowOutsideClick: false
                });

                // Tự động quay về màn hình chờ sau 2 giây
                setTimeout(() => {
                    window.location.href = "/sign/waiting";
                }, 2000);
            }
        });
    }

    // Chạy kiểm tra mỗi 3 giây
    setInterval(checkQueueStatus, 3000);
</script>
{% endblock %}
