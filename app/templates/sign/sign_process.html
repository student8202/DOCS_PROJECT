{% extends "layouts/base_empty.html" %}
{% block content %}
<style>
    /* Bố cục chia 2 phần: Nội dung hồ sơ (Cuộn được) và Vùng ký (Cố định phía dưới) */
    #doc-viewer {
        height: calc(100vh - 250px);
        overflow-y: auto;
        padding: 40px;
        background: #fff;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
    }
    .signature-area {
        height: 250px;
        background: #f1f1f1;
        border-top: 2px solid #ddd;
        position: relative;
        padding: 10px;
    }
    #signature-pad {
        width: 100%;
        height: 160px;
        background: #fff;
        border: 1px dashed #ccc;
        touch-action: none; /* Quan trọng: Chặn cuộn trang khi ký */
    }
    .control-btns {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
    }
</style>

<div class="d-flex flex-column h-100">
    <!-- 1. VÙNG HIỂN THỊ HỒ SƠ (HtmlContent đã render) -->
    <div id="doc-viewer">
        <div id="rendered-content">
            <!-- Dữ liệu HTML từ Queue sẽ nạp vào đây -->
            <div class="text-center mt-5">
                <div class="spinner-border text-success"></div>
                <p>Đang tải hồ sơ...</p>
            </div>
        </div>
    </div>

    <!-- 2. VÙNG KÝ TÊN -->
    <div class="signature-area">
        <div class="small fw-bold text-secondary mb-1">
            <i class="fas fa-pen-nib me-1"></i> VUI LÒNG KÝ VÀO KHUNG DƯỚI ĐÂY:
        </div>
        <canvas id="signature-pad"></canvas>
        
        <div class="control-btns">
            <button class="btn btn-outline-secondary px-4" onclick="SIGN.actions.clear()">
                <i class="fas fa-eraser me-1"></i> KÝ LẠI
            </button>
            <div id="info-ref" class="small text-muted align-self-center"></div>
            <button class="btn btn-success px-5 fw-bold" onclick="SIGN.actions.submit()">
                HOÀN TẤT & GỬI <i class="fas fa-paper-plane ms-1"></i>
            </button>
        </div>
    </div>
</div>

<!-- Lưu QueueID để gửi lên backend -->
<input type="hidden" id="queue_id" value="{{ queue_id }}">
{% endblock %}

{% block scripts %}
<!-- Thư viện Signature Pad (CDN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/1.3.4/signature_pad.min.js" integrity="sha512-Mtr2f9aMp/TVEdDWcRlcREy9NfgsvXvApdxrm3/gK8lAMWnXrFsYaoW01B5eJhrUpBT7hmIjLeaQe0hnL7Oh1w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="/static/js/sign/sign_handler.js"></script>
{% endblock %}
