<!-- Cấu trúc Table Ultra Compact cho FO -->
<div class="card shadow-sm border-top border-4 border-success">
    <div class="card-header bg-white py-1 d-flex justify-content-between align-items-center">
        <span class="small fw-bold text-success">
            <i class="fas fa-bed me-1"></i> KHÁCH ĐANG Ở (IN-HOUSE) - SMILE FO
        </span>
        <!-- LABEL HIỂN THỊ TỔNG FFOLIONUM -->
        <span class="badge bg-secondary-light text-secondary border border-secondary px-2 py-1" style="font-size: 10px;">
            Total Rooms: <b id="lblTotalRooms">0</b>
        </span>
        <!-- NÚT SWITCH CHECKBOX -->
        <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="chkShowResName">
            <label class="form-check-label small fw-bold text-secondary" for="chkShowResName" style="cursor:pointer">
                Show Reservation Name
            </label>
        </div>
        <button class="btn btn-sm py-0 text-secondary" onclick="FO_DASH.actions.reload()" title="Tải lại">
            <i class="fas fa-sync-alt" style="font-size: 10px;"></i>
            <span style="font-size: 10px; font-weight: bold;">TẢI LẠI</span>
        </button>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive px-2 py-1">
            <table id="tblInHouseDash" class="table table-sm table-hover mb-0 w-100 border-0">
                <thead>
                    <tr class="bg-light text-uppercase" style="font-size: 9px;">
                        <th></th>
                        <th class="text-center">Sts</th>
                        <th class="text-center">Sts</th>
                        <th>Folio</th>
                        <th>Conf#</th>
                        <th>Title</th>
                        <th class="text-end">Name</th>
                        <th class="text-center">Rate</th>
                        <th class="text-center">Vip</th>
                        <th class="text-center">Room</th>
                        <th class="text-center">Type</th>
                        <th>Booked</th>
                        <th class="text-center">Arrival</th>
                        <th class="text-center">Departure</th>
                        <th class="text-center">Adl/Chl/Enf</th>
                        <th class="text-center">Share</th>
                        <th class="text-center">MCFLSp</th>
                        <th class="text-center">Group</th>
                        <th class="text-center">Company</th>
                        <th class="text-center">Sales</th>
                        <th class="text-center">BkSts</th>
                        <th class="text-center">NAT</th>
                        <th class="text-center">Comp</th>
                        <th class="text-center">HU</th>
                        <th class="text-center">Arr Time</th>
                        <th class="text-center">Dept Time</th>
                        <th class="text-center">Book Time</th>
                        <th class="text-center">Adt</th>
                        <th class="text-center">Chl</th>
                        <th class="text-center">Enf</th>
                        <th>Specials</th>
                        <th>Notice</th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>

</div>
