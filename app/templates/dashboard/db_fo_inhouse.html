<!-- Cấu trúc Table Ultra Compact cho FO -->
<div class="card shadow-sm border-top border-4 border-success">
    <div class="card-header bg-white py-2">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
            <!-- Nhóm Thống kê & Bộ lọc -->
            <div class="d-flex flex-wrap align-items-center gap-1">
                <span class="small fw-bold text-success me-2"><i class="fas fa-bed"></i> IN-HOUSE</span>

                <!-- All Rooms -->
                <span class="badge border border-secondary text-secondary btn-filter active" id="btnFilterAll"
                    onclick="FO_DASH.actions.filterType('all')" data-bs-toggle="tooltip" data-bs-placement="bottom"
                    title="Đang tính..." style="cursor:pointer; font-size: 10px;">
                    All: <b id="lblTotalRooms">0</b>
                </span>

                <!-- FIT -->
                <span class="badge border border-info text-info btn-filter" id="btnFilterGit"
                    onclick="FO_DASH.actions.filterType('git')" data-bs-toggle="tooltip" data-bs-placement="bottom"
                    title="Đang tính..." style="cursor:pointer; font-size: 10px;">
                    FIT: <b id="lblTotalGit">0</b>
                </span>

                <!-- GIT (Group) -->
                <span class="badge border border-warning text-warning btn-filter" id="btnFilterGroup"
                    onclick="FO_DASH.actions.filterType('group')" data-bs-toggle="tooltip" data-bs-placement="bottom"
                    title="Đang tính..." style="cursor:pointer; font-size: 10px;">
                    GIT: <b id="lblTotalGroup">0</b>
                </span>
            </div>

            <!-- Nhóm Điều khiển -->
            <div class="d-flex align-items-center gap-2">
                <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" id="chkShowResName">
                    <label class="form-check-label small fw-bold text-secondary" for="chkShowResName"
                        style="font-size: 10px;">Show Res</label>
                </div>
                <button class="btn btn-sm btn-light border py-0" onclick="FO_DASH.actions.reload()">
                    <i class="fas fa-sync-alt"></i> <small class="fw-bold">RELOAD</small>
                </button>
            </div>
        </div>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive px-2 py-1">
            <table id="tblInHouseDash" class="table table-sm table-hover mb-0 w-100 border-0">
                <thead>
                    <tr class="bg-light text-uppercase" style="font-size: 9px;">
                        <th></th>
                        <th class="text-center">Sts</th>
                        <th class="text-center">Sts</th>
                        <th>Folio</th>
                        <th>Conf#</th>
                        <th>Title</th>
                        <th class="text-end">Name</th>
                        <th class="text-center">Rate</th>
                        <th class="text-center">Vip</th>
                        <th class="text-center">Room</th>
                        <th class="text-center">Type</th>
                        <th>Booked</th>
                        <th class="text-center">Arrival</th>
                        <th class="text-center">Departure</th>
                        <th class="text-center">Adl/Chl/Enf</th>
                        <th class="text-center">Share</th>
                        <th class="text-center">MCFLSp</th>
                        <th class="text-center">Group</th>
                        <th class="text-center">Company</th>
                        <th class="text-center">Sales</th>
                        <th class="text-center">BkSts</th>
                        <th class="text-center">NAT</th>
                        <th class="text-center">Comp</th>
                        <th class="text-center">HU</th>
                        <th class="text-center">Arr Time</th>
                        <th class="text-center">Dept Time</th>
                        <th class="text-center">Book Time</th>
                        <th class="text-center">Adt</th>
                        <th class="text-center">Chl</th>
                        <th class="text-center">Enf</th>
                        <th>Specials</th>
                        <th>Notice</th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>

</div>
